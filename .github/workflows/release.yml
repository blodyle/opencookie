name: Release

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: "npm dist-tag to publish under"
        required: true
        default: "alpha"
        type: choice
        options:
          - alpha
          - latest
      dry-run:
        description: "Run all checks and npm publish --dry-run without creating a tag or GitHub release"
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release @opencookie/react
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: yarn
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Test package
        run: yarn test

      - name: Typecheck package
        run: yarn typecheck

      - name: Build package
        run: yarn build

      - name: Typecheck example
        run: yarn typecheck:example

      - name: Read package metadata
        id: package
        shell: bash
        run: |
          NAME="$(node -p "require('./packages/react/package.json').name")"
          VERSION="$(node -p "require('./packages/react/package.json').version")"
          TAG="${NAME}@${VERSION}"
          PRERELEASE="false"

          case "$VERSION" in
            *-*) PRERELEASE="true" ;;
          esac

          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Validate package metadata
        shell: bash
        run: |
          test "${{ steps.package.outputs.name }}" = "@opencookie/react"

          if [ "${{ github.event.inputs.dist-tag }}" = "latest" ]; then
            case "${{ steps.package.outputs.version }}" in
              *-*) echo "Refusing to publish prerelease version as latest."; exit 1 ;;
            esac
          fi

      - name: Ensure git tag does not exist
        if: ${{ github.event.inputs.dry-run == 'false' }}
        shell: bash
        run: |
          if git rev-parse "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.package.outputs.tag }} already exists."
            exit 1
          fi

      - name: Ensure npm version does not exist
        shell: bash
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "npm version ${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists."
            exit 1
          fi

      - name: Pack package
        working-directory: packages/react
        run: npm pack --dry-run

      - name: Publish dry run
        if: ${{ github.event.inputs.dry-run == 'true' }}
        working-directory: packages/react
        run: npm publish --access public --tag "${{ github.event.inputs.dist-tag }}" --dry-run

      - name: Publish to npm
        if: ${{ github.event.inputs.dry-run == 'false' }}
        working-directory: packages/react
        run: npm publish --access public --tag "${{ github.event.inputs.dist-tag }}"

      - name: Create git tag
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: git tag "${{ steps.package.outputs.tag }}"

      - name: Push git tag
        if: ${{ github.event.inputs.dry-run == 'false' }}
        run: git push origin "${{ steps.package.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ github.event.inputs.dry-run == 'false' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RELEASE_FLAGS=()

          if [ "${{ steps.package.outputs.prerelease }}" = "true" ]; then
            RELEASE_FLAGS+=(--prerelease)
          fi

          gh release create "${{ steps.package.outputs.tag }}" \
            --title "${{ steps.package.outputs.tag }}" \
            --generate-notes \
            "${RELEASE_FLAGS[@]}"

  deploy-demo:
    name: Deploy demo
    runs-on: ubuntu-latest
    needs: release
    if: ${{ github.event.inputs.dry-run == 'false' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build package
        run: yarn build

      - name: Build example
        run: yarn build:example
        env:
          GITHUB_PAGES: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: examples/next-app-router/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
